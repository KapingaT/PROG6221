name: .NET CI Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: List directory structure (debug)
      run: |
        Get-ChildItem -Path . -Recurse -File | Where-Object { $_.Name -like "*.csproj" }
        Write-Host "Current directory: $(Get-Location)"
    
    - name: Setup .NET 10.0
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        include-prerelease: true
    
    - name: Verify .NET version
      run: dotnet --info
    
    - name: Restore dependencies
      run: dotnet restore
      # This will restore all projects in the current directory
    
    - name: Build all projects
      run: dotnet build --configuration Release --no-restore
    
    - name: Run tests (if any test projects exist)
      run: dotnet test --configuration Release --no-build --verbosity normal
      continue-on-error: true
    
    - name: Publish poepart1
      run: |
        dotnet publish poepart1.csproj --configuration Release --output ./publish/poepart1 --no-restore
      continue-on-error: true
    
    - name: Publish icetask1 (if needed)
      run: |
        dotnet publish icetask1.csproj --configuration Release --output ./publish/icetask1 --no-restore
      continue-on-error: true
    
    - name: Upload poepart1 artifacts
      uses: actions/upload-artifact@v4
      with:
        name: poepart1-build
        path: ./publish/poepart1/
        retention-days: 7
      continue-on-error: true
    
    - name: Upload icetask1 artifacts
      uses: actions/upload-artifact@v4
      with:
        name: icetask1-build
        path: ./publish/icetask1/
        retention-days: 7
      continue-on-error: true
