name: .NET CI Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Allows manual triggering

jobs:
  build-and-test:
    runs-on: windows-latest  # Using Windows because NAudio and System.Windows.Extensions are Windows-specific
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup .NET 10.0
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        include-prerelease: true
    
    - name: Verify .NET version
      run: dotnet --info
    
    - name: Restore dependencies
      run: dotnet restore poepart1.csproj
    
    - name: Build project
      run: dotnet build poepart1.csproj --configuration Release --no-restore
    
    - name: Run tests
      run: dotnet test poepart1.csproj --configuration Release --no-build --verbosity normal
      continue-on-error: true  # Continue even if no tests exist yet
    
    - name: Publish artifact
      run: dotnet publish poepart1.csproj --configuration Release --output ./publish --no-restore
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: poepart1-build
        path: ./publish/
        retention-days: 7

  # Optional: Create a release
  create-release:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: poepart1-build
        path: ./release-artifacts/
    
    - name: Create ZIP archive
      run: |
        cd ./release-artifacts
        zip -r ../poepart1-release.zip .
        cd ..
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: Release v1.0.${{ github.run_number }}
        body: |
          ## Cybersecurity Awareness Bot - Release v1.0.${{ github.run_number }}
          
          ### Features:
          - Interactive chatbot for cybersecurity education
          - Voice greeting functionality
          - Covers topics like malware, phishing, ransomware, and more
          
          ### Installation:
          1. Download the ZIP file
          2. Extract to a folder
          3. Run `poepart1.exe`
          
          ### Requirements:
          - Windows OS
          - .NET 10 Runtime (will prompt to install if missing)
        files: ./poepart1-release.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
